spring:
  application:
    name: Institute

  main:
    banner-mode: off
    log-startup-info: true

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/institute
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format-sql: true

  # Migration Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: false
    validate-on-migrate: false

  # Web Configuration
  mvc:
    log-request-details: true

  # Developer Tools
  devtools:
    restart:
      enabled: true
      additional-exclude: logs/**,**/*.log,**/*.md
      log-condition-evaluation-delta: false

server:
  port: 8080
  error:
    include-message: always

# Security / Custom Properties
jwt:
  secret: ${JWT_SECRET:a-strong-secret-for-dev-change-this}

# Payment Gateway Configuration
payment:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_KEY_SECRET:rzp_secret_placeholder}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  pattern:
    # This formats the logs to be short and clean
    console: "%clr(%d{HH:mm:ss}){faint} %clr(%-5level) %clr(%logger{20}){cyan} : %msg%n"
  level:
    root: WARN
    "org.springframework": WARN
    "org.hibernate": ERROR     # <--- This kills the HHH000 logs
    "org.hibernate.orm": ERROR # <--- Added this to catch all Hibernate logs
    "org.flywaydb": WARN
    "com.zaxxer.hikari": WARN
    "com.institute": INFO      # <--- Ensures your own app logs still show