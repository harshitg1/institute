spring:
  application:
    name: Institute

  main:
    banner-mode: console
    log-startup-info: true

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/institute
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Migration Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Web Configuration
  mvc:
    log-request-details: true

  # Developer Tools
  devtools:
    restart:
      enabled: true
      additional-exclude: logs/**,**/*.log,**/*.md
      log-condition-evaluation-delta: false

server:
  port: 8080
  error:
    include-message: always

# Security / Custom Properties
jwt:
  secret: ${JWT_SECRET:a-strong-secret-for-dev-change-this}

# Payment Gateway Configuration
payment:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_KEY_SECRET:rzp_secret_placeholder}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Logging Configuration
logging:
  pattern:
    console: "%d{HH:mm:ss} %clr(%5p) --- %clr(%-40.40logger{39}){cyan} : %m%n"

  level:
    root: WARN
    com.institute.Institue: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.boot.web.embedded.tomcat.TomcatWebServer: INFO
    org.springframework.boot.SpringApplication: INFO