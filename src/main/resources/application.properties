spring.application.name=Institute
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/institute
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable Flyway automatic migration on Postgres 18.1 (unsupported by current Flyway version)
spring.flyway.enabled=false

JWT_SECRET = a-strong-secret-for-dev-change-this